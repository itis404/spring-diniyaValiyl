<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Форма клиники</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container">
    <div th:replace="~{fragments/header :: header}"></div>

    <div th:if="${error}" class="error-message" th:text="${error}"></div>
    <div th:if="${success}" class="success-message" th:text="${success}"></div>

    <form method="post" th:action="${clinicForm.id == null} ? @{/admin/clinics/create} : @{/admin/clinics/edit/{id}(id=${clinicForm.id})}" enctype="multipart/form-data" th:object="${clinicForm}">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

        <h2 th:text="${clinicForm.id == null} ? 'Новая клиника' : 'Редактирование клиники'"></h2>

        <div class="form-group">
            <label>Название клиники</label>
            <input type="text" th:field="*{name}" required>
            <div th:if="${#fields.hasErrors('name')}" class="field-error" th:errors="*{name}"></div>
        </div>

        <div class="form-group">
            <label>Адрес</label>
            <input type="text" th:field="*{address}" required>
            <div th:if="${#fields.hasErrors('address')}" class="field-error" th:errors="*{address}"></div>
        </div>

        <div class="form-group">
            <label>Телефон</label>
            <input type="tel" th:field="*{phone}" placeholder="+7 (XXX) XXX-XX-XX">
        </div>

        <div class="form-group">
            <label>Часы работы</label>
            <input type="text" th:field="*{workingHours}" placeholder="Пн–Пт 09:00–20:00, Сб 10:00–18:00">
            <div class="info-text">Например: Пн–Пт 09:00–20:00, Сб 10:00–18:00</div>
        </div>

        <div class="form-group">
            <label>Время открытия</label>
            <input type="time" th:field="*{workStart}" step="60">
            <div class="info-text">По умолчанию: 09:00</div>
        </div>

        <div class="form-group">
            <label>Время закрытия</label>
            <input type="time" th:field="*{workEnd}" step="60">
            <div class="info-text">По умолчанию: 20:00</div>
        </div>

        <div class="form-group">
            <label>Рабочие дни</label>
            <select th:field="*{workDays}">
                <option value="">Выберите</option>
                <option value="MON,TUE,WED,THU,FRI">Пн-Пт</option>
                <option value="MON,TUE,WED,THU,FRI,SAT">Пн-Сб</option>
                <option value="MON,TUE,WED,THU,FRI,SAT,SUN">Пн-Вс (ежедневно)</option>
            </select>
            <div class="info-text">По умолчанию: Пн-Пт</div>
        </div>

        <div class="form-group">
            <label>Сайт</label>
            <input type="url" th:field="*{siteUrl}" placeholder="https://example.com">
            <div class="info-text">Введите полный URL с http:// или https://</div>
        </div>

        <div class="form-group">
            <label>Широта</label>
            <input type="number" step="0.000001" th:field="*{latitude}" placeholder="55.796000">
            <div class="info-text">Координата широты для карты</div>
        </div>

        <div class="form-group">
            <label>Долгота</label>
            <input type="number" step="0.000001" th:field="*{longitude}" placeholder="49.115000">
            <div class="info-text">Координата долготы для карты</div>
        </div>

        <div class="form-group">
            <label>Логотип</label>
            <input type="file" name="logo" accept="image/jpeg,image/png,image/jpg">
            <div class="info-text">Рекомендуемый размер: 200x200 пикселей. Оставьте пустым, чтобы сохранить текущий логотип</div>
        </div>

        <div class="form-actions">
            <button type="submit">Сохранить</button>
            <a th:href="@{/admin/clinics}" class="btn-cancel">Отмена</a>
        </div>
    </form>

    <div th:replace="~{fragments/footer :: footer}"></div>
</div>

<script>
    document.querySelector('form').addEventListener('submit', function(event) {
        var name = document.querySelector('[name="name"]').value.trim();
        var address = document.querySelector('[name="address"]').value.trim();

        if (name === '') {
            alert('Пожалуйста, введите название клиники');
            event.preventDefault();
            return false;
        }

        if (address === '') {
            alert('Пожалуйста, введите адрес клиники');
            event.preventDefault();
            return false;
        }

        if (name.length < 2) {
            alert('Название клиники должно содержать минимум 2 символа');
            event.preventDefault();
            return false;
        }

        var siteUrl = document.querySelector('[name="siteUrl"]').value;
        if (siteUrl && !siteUrl.startsWith('http://') && !siteUrl.startsWith('https://')) {
            alert('Сайт должен начинаться с http:// или https://');
            event.preventDefault();
            return false;
        }

        return true;
    });
</script>
</body>
</html>
