<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Создание админа клиники</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container">
    <div th:replace="~{fragments/header :: header}"></div>

    <div th:if="${error}" class="error-message" th:text="${error}"></div>
    <div th:if="${success}" class="success-message" th:text="${success}"></div>

    <form method="post" th:action="@{/admin/create-clinic-admin}" th:object="${registrationDTO}">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        <h2>Создать админа клиники</h2>

        <div class="form-group">
            <label>ФИО</label>
            <input type="text" th:field="*{name}" required>
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" th:field="*{email}" required>
        </div>

        <div class="form-group">
            <label>Пароль</label>
            <input type="password" th:field="*{password}" required>
        </div>

        <div class="form-group">
            <label>Клиника</label>
            <select name="clinicId" required>
                <option value="">Выберите клинику</option>
                <option th:each="clinic : ${clinics}"
                        th:value="${clinic.id}"
                        th:text="${clinic.name}"
                        th:selected="${selectedClinicId != null and selectedClinicId == clinic.id}">
                </option>
            </select>
        </div>

        <button type="submit">Создать</button>
        <a th:href="@{/admin/clinics}" class="btn-cancel">Отмена</a>
    </form>

    <div th:replace="~{fragments/footer :: footer}"></div>
</div>
</body>
</html>
