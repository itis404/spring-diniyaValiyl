<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Управление врачами</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container">
    <div th:replace="~{fragments/header :: header}"></div>

    <div th:if="${success}" class="success-message" th:text="${success}"></div>
    <div th:if="${error}" class="error-message" th:text="${error}"></div>

    <div style="margin: 20px 0;">
        <a th:href="@{/admin/doctors/create}" class="btn">Добавить врача</a>
    </div>

    <h2>Врачи</h2>
    <table>
        <thead>
        <tr><th>Имя</th><th>Специализация</th><th>Опыт</th><th>Действия</th></tr>
        </thead>
        <tbody>
        <tr th:each="doctor : ${doctors}">
            <td th:text="${doctor.name}"></td>
            <td th:text="${doctor.specialization}"></td>
            <td th:text="${doctor.experience} != null ? ${doctor.experience} + ' лет' : ''"></td>
            <td>
                <a th:href="@{/admin/doctors/edit/{id}(id=${doctor.id})}">Редактировать</a>
                <a th:href="@{/admin/doctors/delete/{id}(id=${doctor.id})}" onclick="return confirm('Удалить?')">Удалить</a>
            </td>
        </tr>
        </tbody>
    </table>

    <div th:replace="~{fragments/footer :: footer}"></div>
</div>
</body>
</html>
