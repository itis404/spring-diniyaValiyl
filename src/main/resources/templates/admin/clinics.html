<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Управление клиниками</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container">
    <div th:replace="~{fragments/header :: header}"></div>

    <div th:if="${success}" class="success-message" th:text="${success}"></div>
    <div th:if="${error}" class="error-message" th:text="${error}"></div>

    <div style="margin: 20px 0;">
        <a th:href="@{/admin/clinics/create}" class="btn">Добавить клинику</a>
    </div>

    <h2>Клиники</h2>
    <table>
        <thead>
        <tr><th>Название</th><th>Адрес</th><th>Телефон</th><th>Действия</th></tr>
        </thead>
        <tbody>
        <tr th:each="clinic : ${clinics}">
            <td th:text="${clinic.name}"></td>
            <td th:text="${clinic.address}"></td>
            <td th:text="${clinic.phone}"></td>
            <td>
                <a th:href="@{/admin/clinics/edit/{id}(id=${clinic.id})}">Редактировать</a>
                <a th:href="@{/admin/clinics/delete/{id}(id=${clinic.id})}" onclick="return confirm('Удалить?')">Удалить</a>
                <a th:href="@{/admin/create-clinic-admin(clinicId=${clinic.id})}">Добавить админа</a>
            </td>
        </tr>
        </tbody>
    </table>

    <div th:replace="~{fragments/footer :: footer}"></div>
</div>
</body>
</html>
