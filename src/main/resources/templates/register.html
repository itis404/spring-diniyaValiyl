<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Регистрация</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container">
    <div th:replace="~{fragments/header :: header}"></div>

    <form method="post" th:action="@{/register}" th:object="${registrationDTO}">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        <h2>Регистрация</h2>

        <div th:if="${error}" class="error-message" th:text="${error}"></div>
        <div th:if="${success}" class="success-message" th:text="${success}"></div>

        <div class="form-group">
            <label>Имя</label>
            <input type="text" th:field="*{name}" placeholder="Введите ваше полное имя" required>
            <div th:if="${#fields.hasErrors('name')}" class="field-error" th:errors="*{name}"></div>
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" th:field="*{email}" placeholder="example@mail.ru" required>
            <div th:if="${#fields.hasErrors('email')}" class="field-error" th:errors="*{email}"></div>
        </div>

        <div class="form-group">
            <label>Пароль</label>
            <input type="password" th:field="*{password}" placeholder="Введите пароль" required>
            <div class="info-text">Минимум 6 символов</div>
            <div th:if="${#fields.hasErrors('password')}" class="field-error" th:errors="*{password}"></div>
        </div>

        <div class="form-group">
            <label>Роль</label>
            <select th:field="*{role}" required>
                <option value="PATIENT">Пациент</option>
            </select>
        </div>

        <button type="submit">Зарегистрироваться</button>

        <p style="margin-top: 20px; text-align: center;">Уже есть аккаунт? <a th:href="@{/login}">Войти</a></p>
    </form>

    <div th:replace="~{fragments/footer :: footer}"></div>
</div>
</body>
</html>
