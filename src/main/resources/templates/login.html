<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Вход</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container">
    <div th:replace="~{fragments/header :: header}"></div>

    <form method="post" th:action="@{/login}">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        <h2>Вход</h2>

        <div th:if="${param.error}" class="error-message">
            Неверный email или пароль
        </div>

        <div th:if="${param.logout}" class="success-message">
            Вы вышли из системы
        </div>

        <div th:if="${success}" class="success-message" th:text="${success}"></div>

        <div class="form-group">
            <label>Email</label>
            <input type="text" name="username" placeholder="Email" required>
        </div>

        <div class="form-group">
            <label>Пароль</label>
            <input type="password" name="password" placeholder="Пароль" required>
        </div>

        <button type="submit">Войти</button>

        <p style="margin-top: 20px; text-align: center;">
            Нет аккаунта? <a th:href="@{/register}">Зарегистрироваться</a>
        </p>
    </form>

    <div style="text-align: center; margin: 20px 0;">
        <span style="background: white; padding: 0 10px; color: #666;">Или войдите через</span>
    </div>

    <div style="text-align: center; margin-bottom: 30px;">
        <a th:href="@{/oauth2/authorization/google}"
           style="display: inline-flex; align-items: center; justify-content: center; gap: 10px; background: #db4437; color: white; padding: 12px 24px; border-radius: 8px; text-decoration: none; font-size: 16px;">
            <span style="font-size: 18px; font-weight: bold;">G</span> Войти через Google
        </a>
    </div>

    <div th:replace="~{fragments/footer :: footer}"></div>
</div>
</body>
</html>
